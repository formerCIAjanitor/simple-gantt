<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Segsy Gantt</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f5f5f2;
      --surface:       #ffffff;
      --surface-alt:   #f0efeb;
      --border:        rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.20);
      --text:          #1a1a18;
      --text-secondary:#5f5e5a;
      --text-muted:    #9a9890;
      --accent:        #185fa5;
      --accent-bg:     #e6f1fb;
      --radius:        8px;
      --font:          system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #1c1c1a;
        --surface:       #2a2a28;
        --surface-alt:   #232321;
        --border:        rgba(255,255,255,0.10);
        --border-strong: rgba(255,255,255,0.18);
        --text:          #eeecea;
        --text-secondary:#a8a7a2;
        --text-muted:    #6e6d69;
        --accent:        #85b7eb;
        --accent-bg:     #042c53;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

.brand {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 1.5rem;
}

.brand-logo {
  width: 40px;
  height: auto;
  display: block;
}

.brand-name {
  font-size: 2rem;
  font-weight: 600;
  font-family: system-ui, sans-serif;
  letter-spacing: 0.02em;
}

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      gap: 6px;
      align-items: center;
      padding-right: 12px;
      border-right: 0.5px solid var(--border-strong);
    }

    .toolbar-group:last-child { border-right: none; padding-right: 0; }

    label.tb { font-size: 13px; color: var(--text-secondary); }

    input[type="date"] {
      font-size: 13px; font-family: var(--font);
      padding: 7px 10px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-strong);
      background: var(--surface); color: var(--text);
      outline: none; cursor: pointer;
    }

    input[type="date"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(24,95,165,0.15);
    }

    button {
      font-size: 13px; font-family: var(--font);
      padding: 7px 12px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-strong);
      background: var(--surface); color: var(--text);
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      transition: background 0.1s;
      white-space: nowrap;
    }

    button:hover  { background: var(--surface-alt); }
    button:active { transform: scale(0.98); }
    .zoom-btn { padding: 7px 10px; }

    .view-btn { padding: 7px 14px; border-radius: 0; border-right-width: 0; }
    #viewToggleGroup .view-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    #viewToggleGroup .view-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; border-right-width: 0.5px; }
    .view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .view-btn.active:hover { background: var(--accent); opacity: 0.9; }

    .chart-container {
      overflow-x: auto;
      border: 0.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      position: relative;
    }

    table { border-collapse: collapse; width: auto; min-width: 580px; }
    .table-wrap { position: relative; display: inline-block; min-width: 100%; }
    .task-col { width: 160px; min-width: 160px; }

    .date-header {
      font-size: 11px; color: var(--text-muted);
      text-align: center;
      padding: 3px 2px;
      border-bottom: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
    }

    .month-header {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      text-align: left;
      padding: 3px 4px;
      border-bottom: 0.5px solid var(--border-strong);
      border-right: 0.5px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      background: var(--surface);
    }

    .month-header-label { position: sticky; left: 164px; }

    .date-header.weekend  { background: var(--surface-alt); }
    .date-header.today-col { background: var(--accent-bg); color: var(--accent); font-weight: 500; }

    .task-label {
      padding: 6px 10px;
      border-bottom: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      font-size: 13px; color: var(--text);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap; max-width: 160px;
    }

    .drag-handle {
      color: var(--text-muted);
      cursor: grab;
      font-size: 14px; flex-shrink: 0;
      padding: 2px; border-radius: 4px;
      transition: color 0.1s, background 0.1s;
    }

    .drag-handle:hover  { color: var(--text); background: var(--surface-alt); }
    .drag-handle:active { cursor: grabbing; }

    .task-label input {
      background: transparent; border: none; outline: none;
      font-size: 13px; font-family: var(--font); color: var(--text);
      width: 100%; cursor: pointer; min-width: 0;
    }

    .task-label input:focus {
      background: var(--surface-alt);
      border-radius: 4px; padding: 1px 4px; cursor: text;
    }

    .color-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0; cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.1s;
    }

    .color-dot:hover { border-color: var(--border-strong); }

    .cell {
      border-bottom: 0.5px solid var(--border);
      border-right: 0.5px solid var(--border);
      height: 36px; position: relative;
    }

    .cell.weekend   { background: var(--surface-alt); }
    .cell.today-col { background: var(--accent-bg); }

    .bar {
      position: absolute; top: 6px; bottom: 6px;
      border-radius: 4px; cursor: grab;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; user-select: none;
      transition: opacity 0.1s; min-width: 6px; z-index: 2;
    }

    .bar:hover  { opacity: 0.85; }
    .bar:active { cursor: grabbing; }

    .resize-handle {
      position: absolute; top: 0; bottom: 0; width: 7px;
    }
    .resize-handle.left  { left: 0;  cursor: w-resize; }
    .resize-handle.right { right: 0; cursor: e-resize; }

    .bar-label {
      pointer-events: none; padding: 0 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%; font-size: 11px; font-weight: 500; color: #fff;
    }

    .row-ghost td    { opacity: 0.4; background: var(--accent-bg) !important; }
    .row-drop-above td { border-top: 2px solid var(--accent) !important; }
    .row-drop-below td { border-bottom: 2px solid var(--accent) !important; }

    .add-row {
      padding: 7px 10px; font-size: 12px; color: var(--text-muted);
      cursor: pointer; border-top: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 5px;
      border-radius: 0 0 12px 12px;
      transition: background 0.1s, color 0.1s;
    }

    .add-row:hover { background: var(--accent-bg); color: var(--accent); }

    .color-picker-popup {
      position: fixed; z-index: 200;
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 8px; display: flex; gap: 6px; flex-wrap: wrap; width: 126px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.14);
    }

    .color-swatch {
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
    }

    .color-swatch:hover  { transform: scale(1.15); }
    .color-swatch.active { border-color: var(--text); }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--text); color: var(--bg);
      padding: 8px 16px; border-radius: var(--radius);
      font-size: 13px; z-index: 500;
      transition: opacity 0.4s; pointer-events: none;
    }

    footer { margin-top: 1.5rem; font-size: 12px; color: var(--text-muted); }

    .date-field {
      display: inline-flex; align-items: center;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface); color: var(--text);
      font-size: 13px; font-family: var(--font);
      padding: 7px 10px; gap: 6px; cursor: text;
      position: relative;
    }
    .date-field input[type="text"] {
      border: none; outline: none; background: transparent;
      font-size: 13px; font-family: var(--font); color: var(--text);
      width: 88px; cursor: text;
    }
    .date-field i { color: var(--text-muted); font-size: 14px; cursor: pointer; flex-shrink: 0; }
    .date-field i:hover { color: var(--text); }
    .date-field input[type="date"] {
      position: absolute; opacity: 0; width: 1px; height: 1px;
      top: 0; right: 0; pointer-events: none; border: none;
    }
    .date-field:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(24,95,165,0.15);
    }
  </style>
</head>
<body>

<div class="brand">
  <img src="./logo.png" alt="SEGSY logo" class="brand-logo">
  <span class="brand-name">EGSY</span>
</div>

<div class="toolbar">
  <div class="toolbar-group">
    <label class="tb" for="startDateText">Start</label>
    <div class="date-field">
      <input type="text"  id="startDateText" placeholder="YYYY-MM-DD" maxlength="10" />
      <i class="ti ti-calendar" id="startCalIcon" title="Pick date"></i>
      <input type="date"  id="startDate" tabindex="-1" />
    </div>
    <label class="tb" for="endDateText">End</label>
    <div class="date-field">
      <input type="text"  id="endDateText" placeholder="YYYY-MM-DD" maxlength="10" />
      <i class="ti ti-calendar" id="endCalIcon" title="Pick date"></i>
      <input type="date"  id="endDate" tabindex="-1" />
    </div>
  </div>
  <div class="toolbar-group" id="viewToggleGroup">
    <button id="btnDay"   onclick="setView('day')"   class="view-btn active">Day</button>
    <button id="btnWeek"  onclick="setView('week')"  class="view-btn">Week</button>
    <button id="btnMonth" onclick="setView('month')" class="view-btn">Month</button>
  </div>
  <div class="toolbar-group">
    <button onclick="downloadJSON()"><i class="ti ti-download" aria-hidden="true"></i> Save JSON</button>
    <button onclick="triggerLoad()"><i class="ti ti-folder-open" aria-hidden="true"></i> Load JSON</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" />
  </div>
  <div class="toolbar-group">
    <button onclick="exportPNG()"><i class="ti ti-photo-down" aria-hidden="true"></i> Export PNG</button>
  </div>
</div>

<div class="chart-container" id="chartContainer">
  <div class="table-wrap" id="tableWrap">
    <table id="ganttTable">
      <thead id="ganttHead"></thead>
      <tbody id="ganttBody"></tbody>
    </table>
    <div id="endLine" style="display:none;position:absolute;top:0;bottom:0;width:2px;background:#e24b4a;opacity:0.7;pointer-events:none;z-index:10;"></div>
    <div id="endZone" style="display:none;position:absolute;top:0;bottom:0;right:0;background:rgba(0,0,0,0.04);pointer-events:none;z-index:9;"></div>
  </div>
  <div class="add-row" onclick="addTask()">
    <i class="ti ti-plus" aria-hidden="true"></i> Add task
  </div>
</div>

<div id="colorPicker" class="color-picker-popup" style="display:none;"></div>

<footer>
  Drag <i class="ti ti-grip-vertical" style="font-size:12px;"></i> to reorder rows &nbsp;·&nbsp;
  Right-click a task label to delete &nbsp;·&nbsp;
  Drag bar edges to resize
</footer>

<script>
const COLORS      = ['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#E24B4A','#888780'];
const COLOR_NAMES = ['Blue','Teal','Coral','Pink','Purple','Amber','Green','Red','Gray'];

let tasks = [
  { id:1, name:'Experiment 1',    start:0,  dur:5,  color:'#378ADD' },
  { id:2, name:'Experiment 2',      start:5,  dur:7,  color:'#1D9E75' },
  { id:3, name:'Symposium', start:10, dur:14, color:'#7F77DD' },
  { id:4, name:'Internship',     start:22, dur:6,  color:'#D85A30' },
  { id:5, name:'CR writeup', start:28, dur:3,  color:'#D4537E' },
];
let nextId      = 6;
let days        = 30;
let defaultDays = 30;  // restored when end date is cleared
let cellW       = 28;
let weekMode    = false;  // true = each column represents 7 days
let monthMode   = false;  // true = each column represents one calendar month
let baseDate = new Date(); baseDate.setHours(0,0,0,0);
let endDate  = null;  // null = no deadline set

// ── Controls ───────────────────────────────────────────────────────────
const startDatePicker = document.getElementById('startDate');
const endDatePicker   = document.getElementById('endDate');
const startDateText   = document.getElementById('startDateText');
const endDateText     = document.getElementById('endDateText');

// Expose for legacy references in applyChartData
const startInput = { get value() { return startDateText.value; }, set value(v) { startDateText.value = v; startDatePicker.value = v; } };
const endInput   = { get value() { return endDateText.value;   }, set value(v) { endDateText.value   = v; endDatePicker.value   = v; } };

startDateText.value = fmtDate(baseDate);

function applyStartDate(val) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) return;
  baseDate = new Date(val + 'T00:00:00');
  if (endDate) { const c = dayOffset(endDate) + 1; if (c > 0) days = c; }
  render(); autoSave();
}
function applyEndDate(val) {
  endDate = val ? new Date(val + 'T00:00:00') : null;
  if (endDate) { const c = dayOffset(endDate) + 1; if (c > 0) days = c; }
  else days = defaultDays;
  render(); autoSave();
}

startDateText.addEventListener('change', () => applyStartDate(startDateText.value));
startDateText.addEventListener('input',  () => { if (/^\d{4}-\d{2}-\d{2}$/.test(startDateText.value)) applyStartDate(startDateText.value); });
endDateText.addEventListener('change',   () => applyEndDate(endDateText.value));
endDateText.addEventListener('input',    () => { if (/^\d{4}-\d{2}-\d{2}$/.test(endDateText.value) || endDateText.value === '') applyEndDate(endDateText.value); });

// Calendar icon opens native picker; picker change syncs back to text input
document.getElementById('startCalIcon').addEventListener('click', () => {
  startDatePicker.showPicker ? startDatePicker.showPicker() : startDatePicker.click();
});
document.getElementById('endCalIcon').addEventListener('click', () => {
  endDatePicker.showPicker ? endDatePicker.showPicker() : endDatePicker.click();
});
startDatePicker.addEventListener('change', () => { startDateText.value = startDatePicker.value; applyStartDate(startDatePicker.value); });
endDatePicker.addEventListener('change',   () => { endDateText.value   = endDatePicker.value;   applyEndDate(endDatePicker.value);   });

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      applyChartData(JSON.parse(ev.target.result));
      showToast('Chart loaded');
    } catch { showToast('Could not read file'); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ── Helpers ────────────────────────────────────────────────────────────
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function dayOffset(d) {
  // Use UTC midnight arithmetic to avoid DST shifts
  const a = Date.UTC(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
  const b = Date.UTC(d.getFullYear(), d.getMonth(), d.getDate());
  return Math.round((b - a) / 86400000);
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Threshold below which day-mode columns become too narrow to be useful
const DAY_MODE_MIN_CELL       = 10;
const DAY_MODE_DEFAULT_CELL   = 28;
const WEEK_MODE_DEFAULT_CELL  = 28;
const MONTH_MODE_DEFAULT_CELL = 36;
const MONTH_MODE_MIN_CELL     = 8;
const CELL_MAX = 60;

function setView(mode) {
  const container = document.getElementById('chartContainer');
  const availW    = container.clientWidth - 160;

  weekMode  = false;
  monthMode = false;

  if (mode === 'day') {
    const fitCell = days > 0 ? Math.floor(availW / days) : DAY_MODE_DEFAULT_CELL;
    cellW = Math.min(CELL_MAX, Math.max(DAY_MODE_MIN_CELL, fitCell));
  } else if (mode === 'week') {
    weekMode      = true;
    const weeks   = Math.ceil(days / 7);
    const fitCell = weeks > 0 ? Math.floor(availW / weeks) : WEEK_MODE_DEFAULT_CELL;
    cellW = Math.min(CELL_MAX, Math.max(WEEK_MODE_DEFAULT_CELL, fitCell));
  } else {
    monthMode     = true;
    const months  = getMonthCols().length;
    const fitCell = months > 0 ? Math.floor(availW / months) : MONTH_MODE_DEFAULT_CELL;
    cellW = Math.min(CELL_MAX, Math.max(MONTH_MODE_DEFAULT_CELL, fitCell));
  }

  document.getElementById('btnDay').classList.toggle('active',   mode === 'day');
  document.getElementById('btnWeek').classList.toggle('active',  mode === 'week');
  document.getElementById('btnMonth').classList.toggle('active', mode === 'month');

  render(); autoSave();
}


// ── Render ─────────────────────────────────────────────────────────────
function render() {
  const today       = new Date(); today.setHours(0,0,0,0);
  const todayOff    = dayOffset(today);

  // Monday anchor: find the Monday on or before baseDate
  const baseDow        = baseDate.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const daysToMonday   = baseDow === 0 ? -6 : 1 - baseDow; // offset to prev/current Monday
  // labelAnchor is the offset from day 0 of the first Monday label
  // (may be negative if baseDate is not Monday, meaning first label is before the grid)
  const mondayAnchor   = daysToMonday; // ≤ 0

  if (!weekMode && !monthMode) {
    // ── DAY MODE ─────────────────────────────────────────────────────────

    // Header row 1: month spans
    const head = document.getElementById('ganttHead');
    const monthSpans = [];
    for (let i = 0; i < days; i++) {
      const d   = addDays(baseDate, i);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      if (!monthSpans.length || monthSpans[monthSpans.length-1].key !== key)
        monthSpans.push({ key, label: d.toLocaleString('default', {month:'short', year:'numeric'}), count: 1 });
      else monthSpans[monthSpans.length-1].count++;
    }
    let row1 = `<tr><th class="task-col month-header" style="text-align:left;padding:3px 10px;color:var(--text-secondary);font-size:12px;font-weight:500;">Task</th>`;
    for (const ms of monthSpans) {
      const w = ms.count * cellW;
      row1 += `<th class="month-header" colspan="${ms.count}" style="min-width:${w}px;max-width:${w}px;"><span class="month-header-label">${ms.label}</span></th>`;
    }
    row1 += '</tr>';

    // Header row 2: day numbers, labelled on Mondays
    let row2 = `<tr><th class="task-col date-header" style="border-right:0.5px solid var(--border-strong);"></th>`;
    for (let i = 0; i < days; i++) {
      const d      = addDays(baseDate, i);
      const isWE   = d.getDay()===0||d.getDay()===6;
      const isTd   = i===todayOff;
      // Show label on Mondays (or every other Monday when zoomed out)
      const offsetFromMonday = i - mondayAnchor;
      const show = cellW >= 22 ? offsetFromMonday % 7 === 0
                               : offsetFromMonday % 14 === 0;
      let cls = 'date-header';
      if (isWE)   cls += ' weekend';
      if (isTd)   cls += ' today-col';
      row2 += `<th class="${cls}" style="width:${cellW}px;min-width:${cellW}px;">${show && offsetFromMonday >= 0 ? d.getDate() : ''}</th>`;
    }
    row2 += '</tr>';
    head.innerHTML = row1 + row2;

    // Body: one cell per day
    const body = document.getElementById('ganttBody');
    body.innerHTML = '';
    tasks.forEach(task => {
      const tr = document.createElement('tr');
      tr.dataset.id = task.id;
      tr.appendChild(_makeLabelTd(task));

      for (let i = 0; i < days; i++) {
        const d      = addDays(baseDate, i);
        const isWE   = d.getDay()===0||d.getDay()===6;
        const isTd   = i===todayOff;
        const td     = document.createElement('td');
        let cls = 'cell';
        if (isWE)   cls += ' weekend';
        if (isTd)   cls += ' today-col';
        td.className      = cls;
        td.style.cssText  = `width:${cellW}px;min-width:${cellW}px;`;
        td.dataset.day    = i;
        td.dataset.taskId = task.id;
        tr.appendChild(td);
      }
      body.appendChild(tr);
      _placeBar(tr, task, days, cellW);
    });

  } else if (weekMode) {
    // ── WEEK MODE ────────────────────────────────────────────────────────
    // Each column = one ISO week (Mon–Sun). First column may be a partial week.
    const weekCols = getWeekCols();
    const numCols = weekCols.length;

    // Header row 1: year/month spans across week columns
    const head = document.getElementById('ganttHead');
    // Group week columns by month of their Monday (start of col)
    const monthSpans = [];
    for (let ci = 0; ci < numCols; ci++) {
      const d   = addDays(baseDate, weekCols[ci].startDay);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      if (!monthSpans.length || monthSpans[monthSpans.length-1].key !== key)
        monthSpans.push({ key, label: d.toLocaleString('default', {month:'short', year:'numeric'}), colCount: 1 });
      else monthSpans[monthSpans.length-1].colCount++;
    }
    let row1 = `<tr><th class="task-col month-header" style="text-align:left;padding:3px 10px;color:var(--text-secondary);font-size:12px;font-weight:500;">Task</th>`;
    for (const ms of monthSpans) {
      const w = ms.colCount * cellW;
      row1 += `<th class="month-header" colspan="${ms.colCount}" style="min-width:${w}px;max-width:${w}px;"><span class="month-header-label">${ms.label}</span></th>`;
    }
    row1 += '</tr>';

    // Header row 2: week start date (Monday) for each column
    let row2 = `<tr><th class="task-col date-header" style="border-right:0.5px solid var(--border-strong);"></th>`;
    for (let ci = 0; ci < numCols; ci++) {
      const wc     = weekCols[ci];
      const d      = addDays(baseDate, wc.startDay);
      const isTd   = todayOff >= wc.startDay && todayOff < wc.startDay + wc.count;
      let cls = 'date-header';
      if (isTd)   cls += ' today-col';
      // Show "D Mon" format e.g. "2 Jun"
      const label = cellW >= WEEK_MODE_DEFAULT_CELL
        ? `${d.getDate()} ${d.toLocaleString('default',{month:'short'})}`
        : d.getDate();
      row2 += `<th class="${cls}" style="width:${cellW}px;min-width:${cellW}px;">${label}</th>`;
    }
    row2 += '</tr>';
    head.innerHTML = row1 + row2;

    // Body: one cell per week column
    const body = document.getElementById('ganttBody');
    body.innerHTML = '';
    tasks.forEach(task => {
      const tr = document.createElement('tr');
      tr.dataset.id = task.id;
      tr.appendChild(_makeLabelTd(task));

      for (let ci = 0; ci < numCols; ci++) {
        const wc     = weekCols[ci];
        const isTd   = todayOff >= wc.startDay && todayOff < wc.startDay + wc.count;
        const td     = document.createElement('td');
        let cls = 'cell';
        if (isTd)   cls += ' today-col';
        td.className      = cls;
        td.style.cssText  = `width:${cellW}px;min-width:${cellW}px;`;
        td.dataset.weekCol   = ci;
        td.dataset.weekStart = wc.startDay;
        td.dataset.weekCount = wc.count;
        td.dataset.taskId    = task.id;
        tr.appendChild(td);
      }
      body.appendChild(tr);
      _placeBarCols(tr, task, weekCols, cellW, days);
    });

  } else {
    // ── MONTH MODE ───────────────────────────────────────────────────────
    // Each column = one calendar month. First/last columns may be partial.
    const monthCols = getMonthCols();
    const numCols   = monthCols.length;

    // Header row 1: year spans across month columns (groups consecutive
    // columns that share the same year)
    const head = document.getElementById('ganttHead');
    const yearSpans = [];
    for (let ci = 0; ci < numCols; ci++) {
      const d   = addDays(baseDate, monthCols[ci].startDay);
      const key = `${d.getFullYear()}`;
      if (!yearSpans.length || yearSpans[yearSpans.length-1].key !== key)
        yearSpans.push({ key, label: key, colCount: 1 });
      else yearSpans[yearSpans.length-1].colCount++;
    }
    let row1 = `<tr><th class="task-col month-header" style="text-align:left;padding:3px 10px;color:var(--text-secondary);font-size:12px;font-weight:500;">Task</th>`;
    for (const ys of yearSpans) {
      const w = ys.colCount * cellW;
      row1 += `<th class="month-header" colspan="${ys.colCount}" style="min-width:${w}px;max-width:${w}px;"><span class="month-header-label">${ys.label}</span></th>`;
    }
    row1 += '</tr>';

    // Header row 2: month name for each column, e.g. "Jun"
    let row2 = `<tr><th class="task-col date-header" style="border-right:0.5px solid var(--border-strong);"></th>`;
    for (let ci = 0; ci < numCols; ci++) {
      const mc   = monthCols[ci];
      const d    = addDays(baseDate, mc.startDay);
      const isTd = todayOff >= mc.startDay && todayOff < mc.startDay + mc.count;
      let cls = 'date-header';
      if (isTd) cls += ' today-col';
      const label = d.toLocaleString('default', {month:'short'});
      row2 += `<th class="${cls}" style="width:${cellW}px;min-width:${cellW}px;">${label}</th>`;
    }
    row2 += '</tr>';
    head.innerHTML = row1 + row2;

    // Body: one cell per month column
    const body = document.getElementById('ganttBody');
    body.innerHTML = '';
    tasks.forEach(task => {
      const tr = document.createElement('tr');
      tr.dataset.id = task.id;
      tr.appendChild(_makeLabelTd(task));

      for (let ci = 0; ci < numCols; ci++) {
        const mc   = monthCols[ci];
        const isTd = todayOff >= mc.startDay && todayOff < mc.startDay + mc.count;
        const td   = document.createElement('td');
        let cls = 'cell';
        if (isTd) cls += ' today-col';
        td.className      = cls;
        td.style.cssText  = `width:${cellW}px;min-width:${cellW}px;`;
        td.dataset.monthCol   = ci;
        td.dataset.monthStart = mc.startDay;
        td.dataset.monthCount = mc.count;
        td.dataset.taskId     = task.id;
        tr.appendChild(td);
      }
      body.appendChild(tr);
      _placeBarCols(tr, task, monthCols, cellW, days);
    });
  }
  updateEndLine();
}

// ── End-date boundary line ──────────────────────────────────────────────────
// Draws a pixel-precise red vertical line at the end-date boundary.
// Works in all three modes; in month mode this correctly falls mid-column
// when the end date isn't the last day of a month.
function updateEndLine() {
  const line = document.getElementById('endLine');
  if (!line || !endDate) {
    if (line) line.style.display = 'none';
    const zone = document.getElementById('endZone');
    if (zone) zone.style.display = 'none';
    return;
  }

  const LABEL_W = 160;
  let leftPx;

  if (!weekMode && !monthMode) {
    // Day mode: each column is one day, end date is the right edge of the last day column
    leftPx = LABEL_W + days * cellW;
  } else {
    const cols = monthMode ? getMonthCols() : getWeekCols();
    let px = LABEL_W;
    for (let ci = 0; ci < cols.length; ci++) {
      const c = cols[ci];
      if (days - 1 < c.startDay + c.count) {
        // days - 1 is the last included day. Position the line at its right
        // edge, i.e. after (days - c.startDay) days into this column.
        // Use daysInMonth (the full calendar span of this column) as the
        // denominator so the fraction reflects true position within the column.
        const daysUsed   = days - c.startDay;
        const colSpan    = monthMode ? c.daysInMonth : c.count; // actual days in this column
        px += (daysUsed / colSpan) * cellW;
        break;
      }
      px += cellW;
    }
    leftPx = px;
  }

  line.style.display = 'block';
  line.style.left    = leftPx + 'px';

  // Dead zone: shade the area to the right of the end line
  const zone = document.getElementById('endZone');
  if (zone) {
    const tableWidth = document.getElementById('ganttTable').offsetWidth;
    const zoneWidth  = tableWidth - leftPx;
    if (zoneWidth > 0) {
      zone.style.display = 'block';
      zone.style.left    = leftPx + 'px';
      zone.style.width   = zoneWidth + 'px';
    } else {
      zone.style.display = 'none';
    }
  }
}
function _makeLabelTd(task) {
  const labelTd = document.createElement('td');
  labelTd.className = 'task-label';

  const handle = document.createElement('span');
  handle.className = 'drag-handle';
  handle.dataset.id = task.id;
  handle.setAttribute('aria-label', 'Drag to reorder');
  handle.innerHTML = '<i class="ti ti-grip-vertical"></i>';

  const dot = document.createElement('div');
  dot.className = 'color-dot';
  dot.style.background = task.color;
  dot.dataset.id = task.id;
  dot.title = 'Change color';

  const nameInput = document.createElement('input');
  nameInput.value = task.name;
  nameInput.dataset.id = task.id;
  nameInput.title = 'Click to rename';

  labelTd.appendChild(handle);
  labelTd.appendChild(dot);
  labelTd.appendChild(nameInput);

  // Rename
  nameInput.addEventListener('change', e => {
    const t = tasks.find(x=>x.id===+e.target.dataset.id);
    if (t) { t.name=e.target.value; render(); autoSave(); }
  });
  // Color
  dot.addEventListener('click', e => {
    e.stopPropagation(); showColorPicker(task.id, e.currentTarget);
  });
  // Delete
  labelTd.addEventListener('contextmenu', e => {
    e.preventDefault();
    if (tasks.length>1 && confirm(`Delete "${task.name}"?`)) {
      tasks=tasks.filter(x=>x.id!==task.id); render(); autoSave();
    }
  });
  return labelTd;
}

// ── Bar placement helpers ───────────────────────────────────────────────────
function _makeBar(task, spanCols, extraPx) {
  const bar = document.createElement('div');
  bar.className  = 'bar';
  bar.dataset.id = task.id;
  bar.style.cssText = `background:${task.color};left:0;width:calc(${spanCols*100}% + ${extraPx}px);`;
  const lh = document.createElement('div');
  lh.className='resize-handle left'; lh.dataset.id=task.id; lh.dataset.action='left';
  const bl = document.createElement('span');
  bl.className='bar-label'; bl.textContent=task.name;
  const rh = document.createElement('div');
  rh.className='resize-handle right'; rh.dataset.id=task.id; rh.dataset.action='right';
  bar.appendChild(lh); bar.appendChild(bl); bar.appendChild(rh);
  return bar;
}

function _placeBar(tr, task, totalDays, cw) {
  const barStart = Math.max(0, task.start);
  const barEnd   = Math.min(totalDays, task.start + task.dur);
  if (barStart >= totalDays || barEnd <= 0) return;
  const startCell = tr.cells[barStart + 1];
  if (!startCell) return;
  const span = barEnd - barStart;
  // +span-1 compensates for 0.5px inter-cell borders accumulated across spans.
  // When the bar ends exactly at the grid boundary there's no right-side border
  // to compensate for, so omit the extra pixels to prevent overflow.
  const extraPx = barEnd < totalDays ? span - 1 : 0;
  startCell.appendChild(_makeBar(task, span, extraPx));
}

function _placeBarCols(tr, task, cols, cw, totalDays) {
  const barStart = Math.max(0, task.start);
  const barEnd   = Math.min(totalDays, task.start + task.dur);
  if (barStart >= totalDays || barEnd <= 0) return;

  // Find the column containing barStart, and the fractional offset within it.
  let startCol = 0, startFrac = 0;
  for (let ci = 0; ci < cols.length; ci++) {
    const c = cols[ci];
    if (barStart < c.startDay + c.count) {
      startCol  = ci;
      startFrac = (barStart - c.startDay) / c.count; // 0..1, using THIS column's own day count
      break;
    }
  }

  // Sum pixel width across every column the bar spans, using each column's
  // own day count as the divisor (handles 28-31 day months correctly,
  // and the constant 7 for week columns).
  let widthPx = 0;
  let remaining = barEnd - barStart;
  for (let ci = startCol; ci < cols.length && remaining > 0; ci++) {
    const c = cols[ci];
    const colStartOffset = ci === startCol ? (barStart - c.startDay) : 0;
    const daysInColUsed  = Math.min(c.count - colStartOffset, remaining);
    widthPx   += (daysInColUsed / c.count) * cw;
    remaining -= daysInColUsed;
  }

  const leftPx    = startFrac * cw;
  const startCell = tr.cells[startCol + 1];
  if (!startCell) return;

  const bar = _makeBar(task, 0, 0);
  bar.style.cssText = `background:${task.color};left:${leftPx}px;width:${Math.max(2,widthPx-1)}px;`;
  startCell.appendChild(bar);
}

// ── Bar drag & resize (delegated) ─────────────────────────────────────────
let dragState = null;

// One-time delegated mousedown on the table covers both bars and cells
document.getElementById('ganttTable').addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const bar  = e.target.closest('.bar');
  const cell = e.target.closest('.cell');
  if (bar) {
    onBarMousedown(e, bar);
  } else if (cell) {
    onCellMousedown(e, cell);
  }
});

function onBarMousedown(e, bar) {
  const action = e.target.dataset.action;
  const id     = +(bar.dataset.id);
  const task   = tasks.find(t=>t.id===id);
  if (!task) return;
  dragState = action
    ? {type:'resize',action,task,startX:e.clientX,origStart:task.start,origDur:task.dur}
    : {type:'move',  task,   startX:e.clientX,origStart:task.start,origDur:task.dur};
  e.preventDefault(); e.stopPropagation();
}

function onCellMousedown(e, cell) {
  const taskId = +cell.dataset.taskId;
  const task   = tasks.find(t=>t.id===taskId);
  if (!task) return;

  let day;
  if (!weekMode && !monthMode) {
    day = +cell.dataset.day;
  } else {
    // Determine which day within the week/month column the cursor is over
    const colStart = weekMode ? +cell.dataset.weekStart : +cell.dataset.monthStart;
    const colCount = weekMode ? +cell.dataset.weekCount : +cell.dataset.monthCount;
    const rect      = cell.getBoundingClientRect();
    const frac      = Math.min(0.999, Math.max(0, (e.clientX - rect.left) / rect.width));
    day = colStart + Math.floor(frac * colCount);
  }

  if (day<task.start||day>=task.start+task.dur) {
    dragState={type:'move',task,startX:e.clientX,origStart:task.start,origDur:task.dur};
    e.preventDefault();
  }
}

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  // In week/month mode each column spans multiple days, so convert px → days
  // using a per-day pixel width rather than the column's pixel width.
  // Week columns are always 7 days; month columns vary (28-31), so for month
  // mode we use the actual calendar month the task is currently anchored in.
  let dayPx = cellW;
  if (weekMode) {
    dayPx = cellW / 7;
  } else if (monthMode) {
    const d = addDays(baseDate, Math.max(0, Math.min(days - 1, dragState.task.start)));
    const daysInMo = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    dayPx = cellW / daysInMo;
  }
  const delta = Math.round((e.clientX-dragState.startX)/dayPx);
  const {task,origStart,origDur,type,action} = dragState;
  // `days` equals dayOffset(endDate)+1 when an end date is set, so clamping
  // start+dur to <= days enforces the red-line boundary in all three modes.
  if (type==='move') {
    task.start = Math.max(0, Math.min(origStart + delta, days - origDur));
  } else if (action==='left') {
    const ns = Math.max(0, Math.min(origStart + origDur - 1, origStart + delta));
    task.start = ns;
    task.dur   = Math.max(1, origDur - (ns - origStart));
  } else {
    task.dur = Math.max(1, Math.min(origDur + delta, days - origStart));
  }
  updateBarInPlace(task);
});

// Lightweight bar repositioning during drag — avoids full DOM rebuild and reflow jumps
function updateBarInPlace(task) {
  const barStart = Math.max(0, task.start);
  const barEnd   = Math.min(days, task.start + task.dur);
  const span     = barEnd - barStart;

  // Move the bar element to the correct cell without rebuilding the whole table
  const tbody = document.getElementById('ganttBody');
  const row   = tbody.querySelector(`tr[data-id="${task.id}"]`);
  if (!row) return;

  // Remove existing bar
  const existingBar = row.querySelector('.bar');
  if (existingBar) existingBar.remove();

  if (barStart >= days || barEnd <= 0 || span <= 0) return;

  if (!weekMode && !monthMode) {
    const startCell = row.cells[barStart + 1];
    if (startCell) {
      const extraPx = barEnd < days ? span - 1 : 0;
      startCell.appendChild(_makeBar(task, span, extraPx));
    }
    return;
  }

  // ── WEEK/MONTH MODE: place with day-level precision inside columns ─────
  const cols = monthMode ? getMonthCols() : getWeekCols();
  _placeBarCols(row, task, cols, cellW, days);
}

// Recompute week columns for the current baseDate/days (mirrors the logic in render())
function getWeekCols() {
  const weekCols = [];
  let d0 = 0;
  while (d0 < days) {
    const date  = addDays(baseDate, d0);
    const dow   = date.getDay();
    const toMon = dow === 1 ? 7 : dow === 0 ? 1 : 8 - dow;
    const count = Math.min(toMon, days - d0);
    weekCols.push({ startDay: d0, count });
    d0 += count;
  }
  return weekCols;
}

// Recompute month columns for the current baseDate/days. Each column = one
// calendar month; first/last columns may be partial. count = actual days
// of the range falling in that month (28-31, or fewer at the edges).
function getMonthCols() {
  const monthCols = [];
  let d0 = 0;
  while (d0 < days) {
    const date     = addDays(baseDate, d0);
    const y        = date.getFullYear();
    const m        = date.getMonth();
    const daysInMo = new Date(y, m + 1, 0).getDate(); // days in this calendar month
    const dayOfMo  = date.getDate(); // 1-based
    const toEndOfMo = daysInMo - dayOfMo + 1; // days remaining incl. today
    const count    = Math.min(toEndOfMo, days - d0);
    monthCols.push({ startDay: d0, count, daysInMonth: daysInMo });
    d0 += count;
  }
  return monthCols;
}

// Returns the active column set + per-column "full span" divisor (7 for
// week mode, the calendar month's day count for month mode) so bar-placement
// math can be shared between the two zoomed-out modes.
function getActiveCols() {
  if (monthMode) return { cols: getMonthCols(), kind: 'month' };
  if (weekMode)  return { cols: getWeekCols(),  kind: 'week'  };
  return null;
}

document.addEventListener('mouseup', () => { if (dragState) { dragState=null; render(); autoSave(); } });

// ── Vertical row reorder (delegated) ──────────────────────────────────────
let rowDrag = null;

document.getElementById('ganttBody').addEventListener('mousedown', e => {
  const handle = e.target.closest('.drag-handle');
  if (!handle || e.button !== 0) return;
  const id = +handle.dataset.id;
  const tr = handle.closest('tr');
  rowDrag  = {id, tr, startY:e.clientY, dragging:false, overIndex:null, dropBefore:true};
  e.preventDefault(); e.stopPropagation();
});

document.addEventListener('mousemove', e => {
  if (!rowDrag) return;
  if (!rowDrag.dragging && Math.abs(e.clientY-rowDrag.startY)>4) {
    rowDrag.dragging = true;
    rowDrag.tr.classList.add('row-ghost');
    document.body.style.cursor = 'grabbing';
  }
  if (!rowDrag.dragging) return;

  const rows = Array.from(document.querySelectorAll('#ganttBody tr'));
  rows.forEach(r => r.classList.remove('row-drop-above','row-drop-below'));
  rowDrag.overIndex = null;

  for (let i=0; i<rows.length; i++) {
    const rect = rows[i].getBoundingClientRect();
    if (e.clientY>=rect.top && e.clientY<=rect.bottom && rows[i]!==rowDrag.tr) {
      const before = e.clientY < rect.top + rect.height/2;
      rows[i].classList.add(before ? 'row-drop-above' : 'row-drop-below');
      rowDrag.overIndex  = i;
      rowDrag.dropBefore = before;
      break;
    }
  }
});

document.addEventListener('mouseup', () => {
  if (!rowDrag) return;
  document.body.style.cursor = '';
  document.querySelectorAll('#ganttBody tr').forEach(r =>
    r.classList.remove('row-ghost','row-drop-above','row-drop-below')
  );
  if (rowDrag.dragging && rowDrag.overIndex !== null) {
    const srcIdx  = tasks.findIndex(t=>t.id===rowDrag.id);
    const [moved] = tasks.splice(srcIdx,1);
    let dest = rowDrag.overIndex;
    if (!rowDrag.dropBefore) dest++;
    if (srcIdx < rowDrag.overIndex) dest--;
    tasks.splice(Math.max(0,Math.min(tasks.length,dest)),0,moved);
    autoSave();
  }
  rowDrag = null;
  render();
});

// ── Add task ───────────────────────────────────────────────────────────
function addTask() {
  const last   = tasks.slice(-1)[0];
  const limit  = days - 3;
  const start  = last ? Math.min(last.start+last.dur, limit) : 0;
  const dur    = endDate ? Math.min(5, days - start) : 5;
  tasks.push({id:nextId++, name:'New task', start: Math.max(0, start), dur: Math.max(1, dur), color:COLORS[tasks.length%COLORS.length]});
  render(); autoSave();
}

// ── Color picker ───────────────────────────────────────────────────────
let colorTarget = null;

function showColorPicker(taskId, anchor) {
  colorTarget = taskId;
  const picker = document.getElementById('colorPicker');
  const task   = tasks.find(x=>x.id===taskId);
  picker.innerHTML = COLORS.map((c,i) =>
    `<div class="color-swatch${task&&task.color===c?' active':''}" style="background:${c}" title="${COLOR_NAMES[i]}" data-color="${c}"></div>`
  ).join('');
  picker.querySelectorAll('.color-swatch').forEach(s => {
    s.addEventListener('click', () => {
      const t=tasks.find(x=>x.id===colorTarget);
      if (t) t.color=s.dataset.color;
      picker.style.display='none'; render(); autoSave();
    });
  });
  const rect = anchor.getBoundingClientRect();
  picker.style.cssText=`display:flex;top:${rect.bottom+4+window.scrollY}px;left:${rect.left+window.scrollX}px;`;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.color-picker-popup')&&!e.target.closest('.color-dot'))
    document.getElementById('colorPicker').style.display='none';
});

// ── Chart data helpers ─────────────────────────────────────────────────
function chartData() {
  return { version:1, baseDate:fmtDate(baseDate), endDate: endDate ? fmtDate(endDate) : null, days: defaultDays, cellW, tasks };
}

function applyChartData(data) {
  tasks    = data.tasks;
  cellW    = data.cellW || 28;
  baseDate = new Date(data.baseDate+'T00:00:00');
  endDate  = data.endDate ? new Date(data.endDate+'T00:00:00') : null;
  if (endDate) {
    const computed = dayOffset(endDate) + 1;
    days = computed > 0 ? computed : (data.days || 30);
    defaultDays = data.days || 30;
  } else {
    days = data.days || 30;
    defaultDays = days;
  }
  nextId   = tasks.length ? Math.max(...tasks.map(t=>t.id))+1 : 1;
  startInput.value = data.baseDate;
  endInput.value   = data.endDate || '';
  render();
}

// ── Auto-save (localStorage) ───────────────────────────────────────────
function autoSave() {
  try { localStorage.setItem('gantt_chart', JSON.stringify(chartData())); }
  catch { showToast('⚠️ Could not auto-save — storage full'); }
}

// ── Download JSON ──────────────────────────────────────────────────────
function downloadJSON() {
  const blob = new Blob([JSON.stringify(chartData(), null, 2)], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'gantt.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('JSON downloaded');
}

// ── Load JSON from file ────────────────────────────────────────────────
function triggerLoad() { document.getElementById('fileInput').click(); }

// ── Export PNG ─────────────────────────────────────────────────────────
function exportPNG() {
  const DPR     = 2;
  const ROW_H   = 36;
  const LABEL_W = 160;
  const MONTH_H = 20;
  const DAY_H   = 20;
  const HEAD_H  = MONTH_H + DAY_H;

  const W = LABEL_W + days*cellW;
  const H = HEAD_H  + tasks.length*ROW_H;

  const canvas  = document.createElement('canvas');
  canvas.width  = W*DPR; canvas.height = H*DPR;
  const ctx     = canvas.getContext('2d');
  ctx.scale(DPR,DPR);

  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const C = dark
    ? {bg:'#2a2a28', alt:'#232321', border:'rgba(255,255,255,0.10)',
       borderStrong:'rgba(255,255,255,0.18)',
       text:'#eeecea', muted:'#6e6d69', secondary:'#a8a7a2',
       accent:'#85b7eb', accentBg:'#042c53'}
    : {bg:'#ffffff',  alt:'#f0efeb', border:'rgba(0,0,0,0.12)',
       borderStrong:'rgba(0,0,0,0.20)',
       text:'#1a1a18', muted:'#9a9890', secondary:'#5f5e5a',
       accent:'#185fa5', accentBg:'#e6f1fb'};

  const today    = new Date(); today.setHours(0,0,0,0);
  const todayOff = dayOffset(today);

  // Background
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

  // ── Month row ───────────────────────────────────────────────────────────
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,MONTH_H);

  // Build month spans
  const monthSpans = [];
  for (let i = 0; i < days; i++) {
    const d = addDays(baseDate, i);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!monthSpans.length || monthSpans[monthSpans.length-1].key !== key) {
      monthSpans.push({ key, label: d.toLocaleString('default', {month:'short', year:'numeric'}), start: i, count: 1 });
    } else {
      monthSpans[monthSpans.length-1].count++;
    }
  }

  ctx.font = '600 11px system-ui,sans-serif';
  for (const ms of monthSpans) {
    const x = LABEL_W + ms.start * cellW;
    const w = ms.count * cellW;
    ctx.fillStyle = C.secondary;
    ctx.fillText(ms.label, x + 3, MONTH_H/2 + 4);
    // right border per month
    ctx.strokeStyle = C.border; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x+w, 0); ctx.lineTo(x+w, MONTH_H); ctx.stroke();
  }

  // Month row bottom border (stronger)
  ctx.strokeStyle = C.borderStrong; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(0, MONTH_H); ctx.lineTo(W, MONTH_H); ctx.stroke();

  // Label column header
  ctx.font = '500 12px system-ui,sans-serif'; ctx.fillStyle = C.secondary;
  ctx.fillText('Task', 10, MONTH_H/2 + 4);

  // ── Day row ─────────────────────────────────────────────────────────────
  for (let i = 0; i < days; i++) {
    const d    = addDays(baseDate, i);
    const isWE = d.getDay()===0||d.getDay()===6;
    const isTd = i===todayOff;
    const x    = LABEL_W + i*cellW;
    const y    = MONTH_H;
    if (isWE) { ctx.fillStyle=C.alt;      ctx.fillRect(x,y,cellW,DAY_H); }
    if (isTd) { ctx.fillStyle=C.accentBg; ctx.fillRect(x,y,cellW,DAY_H); }
    const show = cellW >= 22 ? i % 7 === 0 : i % 14 === 0;
    if (show) {
      ctx.font      = '11px system-ui,sans-serif';
      ctx.fillStyle = isTd ? C.accent : C.muted;
      ctx.textAlign = 'center';
      ctx.fillText(String(d.getDate()), x + cellW/2, y + DAY_H/2 + 4);
      ctx.textAlign = 'left';
    }
    ctx.strokeStyle=C.border; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+DAY_H); ctx.stroke();
  }

  // Day row bottom border
  ctx.strokeStyle=C.border; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,HEAD_H); ctx.lineTo(W,HEAD_H); ctx.stroke();

  // Rows
  tasks.forEach((task,ti) => {
    const y = HEAD_H+ti*ROW_H;
    ctx.fillStyle=C.bg; ctx.fillRect(0,y,W,ROW_H);

    for (let i=0; i<days; i++) {
      const d    = addDays(baseDate,i);
      const isWE = d.getDay()===0||d.getDay()===6;
      const isTd = i===todayOff;
      const cx   = LABEL_W+i*cellW;
      if (isWE) { ctx.fillStyle=C.alt;      ctx.fillRect(cx,y,cellW,ROW_H); }
      if (isTd) { ctx.fillStyle=C.accentBg; ctx.fillRect(cx,y,cellW,ROW_H); }
      ctx.strokeStyle=C.border; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx,y+ROW_H); ctx.stroke();
    }

    // Row bottom border
    ctx.strokeStyle=C.border; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(0,y+ROW_H); ctx.lineTo(W,y+ROW_H); ctx.stroke();

    // Color dot
    ctx.beginPath(); ctx.arc(20,y+ROW_H/2,5,0,Math.PI*2);
    ctx.fillStyle=task.color; ctx.fill();

    // Task name (truncated)
    ctx.font='13px system-ui,sans-serif'; ctx.fillStyle=C.text;
    let label=task.name;
    const maxW=LABEL_W-34;
    while (ctx.measureText(label).width>maxW && label.length>1) label=label.slice(0,-1);
    if (label!==task.name) label=label.slice(0,-1)+'…';
    ctx.fillText(label, 30, y+ROW_H/2+4);

    // Bar
    const barStart=Math.max(0,task.start);
    const barEnd  =Math.min(days,task.start+task.dur);
    if (barStart<days&&barEnd>0) {
      const bx=LABEL_W+barStart*cellW, bw=(barEnd-barStart)*cellW-1, bh=ROW_H-12;
      ctx.fillStyle=task.color;
      ctx.beginPath(); ctx.roundRect(bx,y+6,bw,bh,4); ctx.fill();
      if (bw>20) {
        ctx.font='500 10px system-ui,sans-serif'; ctx.fillStyle='#fff';
        ctx.save(); ctx.beginPath(); ctx.rect(bx+2,y+6,bw-4,bh); ctx.clip();
        ctx.fillText(task.name, bx+6, y+6+bh/2+3); ctx.restore();
      }
    }
  });

  // Label column right border
  ctx.strokeStyle=C.border; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(LABEL_W,0); ctx.lineTo(LABEL_W,H); ctx.stroke();

  // Today line
  if (todayOff>=0&&todayOff<days) {
    const tx=LABEL_W+todayOff*cellW+cellW/2;
    ctx.strokeStyle=C.accent; ctx.lineWidth=2; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(tx,0); ctx.lineTo(tx,H); ctx.stroke();
    ctx.globalAlpha=1;
  }

  // Outer border
  ctx.strokeStyle=dark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.15)'; ctx.lineWidth=1;
  ctx.strokeRect(0,0,W,H);

  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png'); a.download='gantt.png'; a.click();
}

// ── Toast ──────────────────────────────────────────────────────────────
function showToast(msg) {
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),400); },1800);
}

// ── Boot ───────────────────────────────────────────────────────────────
(function() {
  try {
    const raw = localStorage.getItem('gantt_chart');
    if (raw) applyChartData(JSON.parse(raw));
    else render();
  } catch { render(); }
})();
</script>
</body>
</html>
